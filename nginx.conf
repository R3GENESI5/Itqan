server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        text/plain
        text/xml;

    # ── Worker tuning (low-traffic NAS) ─────────────────────────────
    # worker_connections is set at the http/main level; 512 is the
    # alpine default and fine for a NAS.

    # ── JSON data files — long cache (1 week) ──────────────────────
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ── HTML — short cache (1 hour) ────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Static assets (CSS/JS) — moderate cache (1 day) ────────────
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Default: clean URLs with fallback ──────────────────────────
    location / {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri $uri/ $uri.html /index.html;
    }
}
